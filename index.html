                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100" id="tableBody">

                </table>
            </div>
            <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 text-xs text-slate-500 font-medium" id="resultCount">
                Loading programs...
            </div>
        </div>
    </div>

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">No programs found matching your search.</td></tr>`;
            }
            
            data.forEach((p, index) => {
                // Main visible row
                const row = document.createElement('tr');
                row.className = "cursor-pointer row-hover hover:bg-indigo-50/50 group";
                row.onclick = () => toggleRow(index);
                
                row.innerHTML = `
                    <td class="px-6 py-5 text-slate-400">
                        <svg id="icon-${index}" class="w-5 h-5 chevron-icon group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </td>
                    <td class="px-6 py-5 font-bold text-slate-900">${p.university}</td>
                    <td class="px-6 py-5">
                        <div class="font-medium text-slate-800">${p.programName}</div>
                        <div class="text-sm text-slate-500 mt-1">${p.specializations}</div>
                    </td>
                    <td class="px-6 py-5">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800 border border-emerald-200">${p.intake}</span>
                    </td>
                    <td class="px-6 py-5 text-sm text-slate-600 hidden md:table-cell">
                        ${p.testReqs}
                    </td>
                `;

                // Expandable details container (hidden initially using max-height 0)
                const detailsRow = document.createElement('tr');
                detailsRow.className = "bg-indigo-50/20";

                    <td colspan="5" class="p-0 border-none">
                        <div id="content-${index}" class="expand-content max-h-0 opacity-0 overflow-hidden">
                            <div class="px-8 py-6 border-b border-indigo-100/50">

                                    <h3 class="text-lg font-bold text-indigo-900">${p.university} Profile</h3>
                                    <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg shadow-sm hover:bg-indigo-700 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                        Visit Program Website
                                        <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>

                                            Eligibility & Tests

                                            <li><strong class="text-slate-900">Visa/Citizenship:</strong> ${p.visaCitizenship}</li>
                                            <li><strong class="text-slate-900">Tests Required:</strong> ${p.testReqs}</li>
                                            <li><strong class="text-slate-900">English Req:</strong> ${p.englishReqs}</li>
                                        </ul>
                                    </div>

                                            <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

                                        </ul>

                body.appendChild(detailsRow);

        }

        function toggleRow(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            // Check if it's currently open
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                // Close it
                content.style.maxHeight = '0px';
                content.style.opacity = '0';
                icon.style.transform = 'rotate(0deg)';
            } else {
                // Close all other open rows first (optional accordion behavior)
                document.querySelectorAll('.expand-content').forEach(el => {
                    el.style.maxHeight = '0px';
                    el.style.opacity = '0';
                });
                document.querySelectorAll('.chevron-icon').forEach(el => {
                    el.style.transform = 'rotate(0deg)';
                });

                // Open this one
                content.style.maxHeight = content.scrollHeight + 'px';
                content.style.opacity = '1';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // Search listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = programsData.filter(p => 
                p.university.toLowerCase().includes(term) || 
                p.specializations.toLowerCase().includes(term) ||
                p.programName.toLowerCase().includes(term) ||
                p.testReqs.toLowerCase().includes(term) ||
                p.visaCitizenship.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        // Initial render
        renderTable(programsData);
    </script>
